<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚩 Jai Shree Ram 🚩</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

/* Hero Section */

.hero{
    background:url('pexels-kolkatarchobiwala-29508543.jpg')
    center center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.55);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(4px);
}

h1{
    font-size:70px;
    color:#ff9933;
    text-shadow:0 0 20px yellow;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px yellow;
    }
    to{
        text-shadow:0 0 35px orange;
    }
}

h2{
    margin-top:15px;
    color:white;
}

/* Music Button */

.music-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff9933;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.music-btn:hover{
    background:#ff6600;
}

/* Gallery */

.gallery{
    padding:60px 20px;
    background:#1a1a1a;
}

.gallery h2{
    color:#ffcc00;
    margin-bottom:30px;
}

.slider{
    width:90%;
    max-width:700px;
    margin:auto;
}

.slider img{
    width:100%;
    border-radius:20px;
    box-shadow:0 0 25px orange;
    transition:0.5s;
}

.slider img:hover{
    transform:scale(1.03);
}

/* Ram Section */

.ram-section{
    padding:60px 20px;
    background:#111;
}

.ram-img{
    width:500px;
    max-width:95%;
    border-radius:20px;
    box-shadow:0 0 25px orange;
}

.quote{
    margin-top:25px;
    font-size:32px;
    color:#ffcc00;
    font-weight:bold;
}

.quote2{
    margin-top:15px;
    font-size:22px;
    color:white;
}

/* Footer */

footer{
    padding:25px;
    background:black;
    color:#ffcc00;
}

/* Mobile */

@media(max-width:768px){

    h1{
        font-size:40px;
    }

    .quote{
        font-size:24px;
    }

    .quote2{
        font-size:18px;
    }

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

<div class="overlay">

<h1>🚩 JAI SHREE RAM 🚩</h1>

<h2>॥ श्री राम जय राम जय जय राम ॥</h2>

<button class="music-btn" onclick="playMusic()">
🎵 Play Bhajan
</button>

</div>

</section>

<!-- GALLERY -->

<section class="gallery">

<h2>🚩 Ram Mandir Gallery 🚩</h2>

<div class="slider">

<img id="sliderImage"
src="pexels-kolkatarchobiwala-29508543.jpg">

</div>

</section>

<!-- LORD RAM -->

<section class="ram-section">

<img
src="saurabh-solanki-MLTEUgMj7XY-unsplash.jpg"
class="ram-img"
alt="Lord Ram">

<p class="quote">
धर्मो रक्षति रक्षितः
</p>

<p class="quote2">
🚩 जय श्री राम 🚩
</p>

</section>

<footer>

<h3>
🙏 Created with Devotion to Lord Ram 🙏
</h3>

</footer>

<!-- Audio -->

<audio id="bhajan">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

/* Image Slider */

const images = [

"pexels-kolkatarchobiwala-29508543.jpg",

"saurabh-solanki-MLTEUgMj7XY-unsplash.jpg"

];

let current = 0;

setInterval(() => {

current++;

if(current >= images.length){
current = 0;
}

document.getElementById("sliderImage").src = images[current];

},3000);

/* Music */

function playMusic(){

document.getElementById("bhajan").play();

}

</script>

</body>
</html>
