<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚩 Jai Shree Ram 🚩</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

.hero{
    background:url('pexels-kolkatarchobiwala-29508543.jpg') center center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:15px;
}

h1{
    font-size:70px;
    color:#ff9933;
    text-shadow:0 0 20px yellow;
}

h2{
    margin-top:15px;
    color:white;
}

.ram-section{
    padding:50px 20px;
    background:#1a1a1a;
}

.ram-img{
    width:350px;
    max-width:90%;
    border-radius:15px;
    box-shadow:0 0 25px orange;
}

.quote{
    margin-top:20px;
    font-size:24px;
    color:#ffcc00;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
    <div class="overlay">
        <h1>🚩 JAI SHREE RAM 🚩</h1>
        <h2>॥ श्री राम जय राम जय जय राम ॥</h2>
    </div>
</section>

<section class="ram-section">

    <img src="saurabh-solanki-MLTEUgMj7XY-unsplash.jpg"
         alt="Lord Ram"
         class="ram-img">

    <p class="quote">
        धर्मो रक्षति रक्षितः
    </p>

</section>

</body>
</html>
